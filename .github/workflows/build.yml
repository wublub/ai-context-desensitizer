name: build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            pyinstaller --noconfirm ai-context-desensitizer.spec
          else
            pyinstaller --noconfirm --onefile main.py
          fi

      - name: Package
        shell: bash
        run: |
          mkdir -p release
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp dist/ai-context-desensitizer.exe release/ai-context-desensitizer-windows.exe
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            cp dist/main release/ai-context-desensitizer-macos
          else
            cp dist/main release/ai-context-desensitizer-linux
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*